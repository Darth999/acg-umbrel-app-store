version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: darth999-aurum-node_aurum-node_1
      APP_PORT: 9988
      PROXY_AUTH_ADD: "false"

  aurum-node:
    image: ariworksonline/aurum-node:latest
    restart: on-failure
    command: >
      ./src/aurumd
      -datadir=/root/.aurum
      -server=1
      -rpcallowip=0.0.0.0/0
      -rpcbind=0.0.0.0
      -rpcport=9988
      -port=9989
      -rpcuser=umbrel
      -rpcpassword=${APP_PASSWORD}
    volumes:
      - ${APP_DATA_DIR}/data:/root/.aurum
    ports:
      - "9989:9889"    # P2P
      - "9988:9888"    # RPC
      - "28332:28332"  # ZMQ
   
