version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: darth999-aurum-node_web_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  web:
    image: nginx:alpine
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${APP_DATA_DIR}/index.html:/usr/share/nginx/html/index.html:ro

  aurum-node:
    image: ariworksonline/aurum-node:latest
    restart: on-failure
    command: >
       ./src/aurumd
       -datadir=/root/.aurum
       -server=1
       -rpcallowip=0.0.0.0/0
       -rpcbind=0.0.0.0
       -rpcport=9888
       -port=9889
       -rpcuser=umbrel
       -rpcpassword=${APP_PASSWORD}
       -zmqpubrawblock=tcp://0.0.0.0:28332
       -zmqpubrawtx=tcp://0.0.0.0:28332
    volumes:
      - ${APP_DATA_DIR}/data:/root/.aurum
    ports:
      - "9889:9889"
